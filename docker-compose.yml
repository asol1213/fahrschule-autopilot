services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=CHANGE_ME
      - N8N_SECURE_COOKIE=false
      - N8N_DEPLOYMENT_TYPE=default
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      # Supabase
      - SUPABASE_URL=https://YOUR-PROJECT.supabase.co
      - SUPABASE_SERVICE_KEY=your_supabase_service_role_key
      - TENANT_ID=11111111-1111-1111-1111-111111111111
      # Twilio (WhatsApp Sandbox)
      - TWILIO_WHATSAPP_FROM=whatsapp:+14155238886
      # Fahrschul-Infos
      - FAHRSCHUL_NAME=Fahrschule Testmeister
      - FAHRSCHULINHABER_TELEFON=+491721234567
      - FAHRLEHRER_TELEFON=+491721234567
      - WEBSITE_URL=https://fahrschulautopilot.de
      - N8N_WEBHOOK_BASE_URL=http://localhost:5678
      - EMAIL_FROM=info@fahrschule-test.de
      # AI FAQ-Bot
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-PLACEHOLDER}
      # FAQ-Bot Kontext
      - OEFFNUNGSZEITEN=Mo-Fr 9-18 Uhr, Sa 9-13 Uhr
      - KOSTEN_KLASSE_B=ca. 2.500-3.500 EUR
      - THEORIE_ZEITEN=Di + Do, 18:30-20:00 Uhr
    volumes:
      - n8n_data:/home/node/.n8n

  whatsapp:
    build: ./whatsapp-service
    container_name: whatsapp
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_data:/data/session
    environment:
      - TZ=Europe/Berlin

volumes:
  n8n_data:
  whatsapp_data:
