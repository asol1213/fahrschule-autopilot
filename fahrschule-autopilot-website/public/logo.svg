<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background with subtle gradient -->
  <rect width="40" height="40" rx="12" fill="url(#bg)"/>

  <!-- Outer ring glow effect -->
  <circle cx="20" cy="20" r="14" stroke="white" stroke-width="0.5" opacity="0.15"/>

  <!-- Steering wheel - outer ring -->
  <circle cx="20" cy="20" r="11.5" stroke="white" stroke-width="2.2" fill="none"/>

  <!-- Steering wheel - inner hub -->
  <circle cx="20" cy="20" r="4" fill="url(#hub)"/>

  <!-- Spokes - elegant 3-spoke design -->
  <line x1="20" y1="16" x2="20" y2="8.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="16.5" y1="22" x2="10.2" y2="25.8" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="23.5" y1="22" x2="29.8" y2="25.8" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Lightning bolt - crisp, centered in hub -->
  <path d="M21.8 16L18.5 20.5h2.8L19.2 25l4.5-5.5h-2.7L21.8 16z" fill="url(#bolt)"/>

  <!-- Subtle speed lines left -->
  <line x1="2" y1="16" x2="5.5" y2="16" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <line x1="1" y1="20" x2="5.5" y2="20" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="2" y1="24" x2="5.5" y2="24" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.25"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="bolt" x1="19" y1="16" x2="22" y2="25">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="hub" cx="20" cy="20" r="4">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </radialGradient>
  </defs>
</svg>
